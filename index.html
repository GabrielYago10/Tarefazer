<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tarefazer</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>

        <div class="logo">

            <h1>Tarefazer</h1>

            <p>Organize seu fluxo, conclua mais.</p>

        </div>

        <button id="novaTarefa">
            + Nova tarefa
        </button>

    </header>

    <main class="kanban">

        <section class="coluna" data-coluna="todo">

            <div class="titulo-coluna">
                <h2>A Fazer</h2>
                <span>0</span>
            </div>

            <div class="cards" id="todo"></div>

        </section>

        <section class="coluna" data-coluna="doing">

            <div class="titulo-coluna">
                <h2>Fazendo</h2>
                <span>0</span>
            </div>

            <div class="cards" id="doing"></div>

        </section>

        <section class="coluna" data-coluna="review">

            <div class="titulo-coluna">
                <h2>Revisão</h2>
                <span>0</span>
            </div>

            <div class="cards" id="review"></div>

        </section>

        <section class="coluna" data-coluna="done">

            <div class="titulo-coluna">
                <h2>Concluído</h2>
                <span>0</span>
            </div>

            <div class="cards" id="done"></div>

        </section>

    </main>

    <div class="modal-overlay hidden">

        <div class="modal">

            <h2>Nova tarefa</h2>

            <form id="formTarefa">

                <label>Título</label>

                <input id="titulo" type="text" placeholder="Ex: Criar tela de login" required>

                <label>Descrição</label>

                <textarea id="descricao" rows="4" placeholder="Descreva a tarefa..." required></textarea>

                <label>Prioridade</label>

                <select id="propriedade">

                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>

                </select>

                <label>Coluna</label>

                <select id="coluna">

                    <option value="todo">A Fazer</option>
                    <option value="doing">Fazendo</option>
                    <option value="review">Revisão</option>
                    <option value="done">Concluído</option>

                </select>

                <div class="acoes-modal">

                    <button type="button" class="cancelar">

                        Cancelar

                    </button>

                    <button type="submit" class="salvar">

                        Criar tarefa

                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
